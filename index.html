<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DocScan Pro — Premium Scanner</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        :root {
            --bg-main: #090a0f;
            --surface: #161824;
            --accent: #3b82f6;
            --accent-gradient: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --paper-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
        }

        body.light-mode {
            --bg-main: #f3f4f6;
            --surface: #ffffff;
            --accent: #2563eb;
            --accent-gradient: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --paper-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            height: -webkit-fill-available;
            overflow: hidden;
            background-color: var(--bg-main);
            transition: background-color 0.3s;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--surface);
            opacity: 0.95;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 10;
            flex-shrink: 0;
        }

        header h1 {
            font-size: 1.1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        header h1 i {
            color: var(--accent);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-theme-toggle {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 4px;
        }

        .badge-pages {
            background: rgba(59, 130, 246, 0.15);
            color: var(--accent);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .viewport-container {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            overflow: hidden;
            min-height: 0;
        }

        video, canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
        }

        /* Flash de captura */
        .flash-effect {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fff;
            opacity: 0;
            z-index: 20;
            pointer-events: none;
        }
        @keyframes flashAnim {
            0% { opacity: 0; }
            15% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* Tela de erro da câmera */
        .camera-error-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #111;
            z-index: 15;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            text-align: center;
            color: #fff;
        }
        .camera-error-overlay i { font-size: 2.5rem; color: #ef4444; margin-bottom: 15px; }
        .camera-error-overlay p { font-size: 0.95rem; margin-bottom: 20px; color: #ccc; }
        .btn-retry-camera {
            background: var(--accent-gradient);
            color: white; border: none; padding: 10px 20px;
            border-radius: 20px; font-weight: 600; cursor: pointer;
        }

        /* Container que simula a folha física do Scanner */
        .paper-container {
            background: #ffffff;
            background-image: radial-gradient(rgba(0,0,0,0.03) 1px, transparent 0);
            background-size: 4px 4px;
            box-shadow: var(--paper-shadow);
            max-width: 85vw;
            max-height: 52vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            transition: aspect-ratio 0.2s ease, box-shadow 0.3s;
        }
        .format-a4 { aspect-ratio: 210 / 297; }
        .format-carta { aspect-ratio: 215.9 / 279.4; }
        .format-oficio { aspect-ratio: 215.9 / 355.6; }

        .preview-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            transition: transform 0.2s ease, filter 0.2s;
            transform-origin: center;
        }

        /* Filtros CSS correspondentes */
        .filter-scanner { filter: brightness(1.22) contrast(1.85) grayscale(0.4); }
        .filter-bw { filter: contrast(3) grayscale(1) brightness(1.1); }
        .filter-color { filter: contrast(1.4) brightness(1.15) saturate(1.3); }
        .filter-original { filter: none; }

        .scanner-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .viewfinder-guide {
            width: 100%;
            height: 80%;
            max-width: 80vw;
            max-height: 52vh;
            border: 2px dashed rgba(255, 255, 255, 0.4);
            border-radius: 16px;
            position: relative;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.55);
        }

        .viewfinder-guide::before {
            content: '';
            position: absolute;
            width: 30px;
            height: 30px;
            border: 4px solid var(--accent);
            top: -4px; left: -4px;
            border-right: none; border-bottom: none;
            border-top-left-radius: 16px;
        }

        .viewfinder-guide .corner-br {
            position: absolute;
            bottom: -4px; right: -4px;
            width: 30px;
            height: 30px;
            border: 4px solid var(--accent);
            border-left: none; border-top: none;
            border-bottom-right-radius: 16px;
        }

        .viewfinder-guide .corner-tr {
            position: absolute;
            top: -4px; right: -4px;
            width: 30px;
            height: 30px;
            border: 4px solid var(--accent);
            border-left: none; border-bottom: none;
            border-top-right-radius: 16px;
        }

        .viewfinder-guide .corner-bl {
            position: absolute;
            bottom: -4px; left: -4px;
            width: 30px;
            height: 30px;
            border: 4px solid var(--accent);
            border-right: none; border-top: none;
            border-bottom-left-radius: 16px;
        }

        .helper-text {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.75);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            white-space: nowrap;
        }
        .helper-text.warning {
            background: #7c2d12;
            border-color: #ea580c;
            color: #ffedd5;
        }

        .scale-control-panel {
            background: var(--surface);
            padding: 12px 15px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.85rem;
            z-index: 10;
            flex-shrink: 0;
        }

        .scale-control-panel select {
            background: var(--bg-main);
            color: var(--text-primary);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.8rem;
            outline: none;
            cursor: pointer;
        }

        .scale-control-panel input[type="range"] {
            flex: 1;
            min-width: 60px;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .filter-tabs {
            display: flex;
            gap: 6px;
            width: 100%;
            margin-top: 4px;
            overflow-x: auto;
        }
        .btn-filter-tab {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-primary);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            cursor: pointer;
            white-space: nowrap;
        }
        .btn-filter-tab.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .thumbnails-tray {
            height: 95px;
            background: var(--bg-main);
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 20px;
            overflow-x: auto;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            flex-shrink: 0;
        }

        .thumb-wrapper {
            position: relative;
            min-width: 55px;
            height: 75px;
            border-radius: 6px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.2);
            cursor: grab;
            transition: transform 0.2s, border-color 0.2s;
            flex-shrink: 0;
        }
        .thumb-wrapper:active { cursor: grabbing; }

        .thumb-wrapper.active-thumb {
            border-color: var(--accent);
            transform: scale(1.05);
        }

        .thumb-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .thumb-scale-badge {
            position: absolute;
            bottom: 2px;
            right: 2px;
            background: rgba(0,0,0,0.8);
            color: #fff;
            font-size: 9px;
            padding: 2px 4px;
            border-radius: 3px;
        }

        .control-panel {
            background: var(--surface);
            padding: 15px 20px 25px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 10;
            flex-shrink: 0;
            gap: 10px;
        }

        .btn-secondary {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .btn-trigger-outer {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: 4px solid var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .btn-trigger-inner {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background: var(--text-primary);
            transition: transform 0.1s;
        }
        
        .btn-trigger-outer:active .btn-trigger-inner {
            transform: scale(0.9);
        }

        .btn-save-pdf {
            background: var(--accent-gradient);
            color: white;
            padding: 14px 20px;
            border-radius: 25px;
            font-weight: 600;
            font-size: 0.9rem;
            border: none;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-save-pdf:disabled, .btn-secondary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        .hide { display: none !important; }
        
        .view-container { 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            width: 100vw; 
            overflow: hidden; 
        }

        .home-content { 
            padding: 20px; 
            overflow-y: auto; 
            flex: 1; 
            min-height: 0;
        }
        
        .btn-scan-main {
            background: var(--accent-gradient);
            color: white;
            border: none;
            padding: 16px 24px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 600;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .docs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(145px, 1fr));
            gap: 15px;
            padding-bottom: 20px;
        }

        .doc-card {
            background: var(--surface);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .doc-preview {
            width: 100%;
            height: 120px;
            background: #000;
            border-radius: 8px;
            object-fit: cover;
        }

        .doc-title-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 4px;
            min-height: 24px;
        }

        .doc-title { 
            font-size: 0.9rem; 
            font-weight: 600; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis;
            flex: 1;
        }

        .inline-rename-input {
            width: 100%;
            background: var(--bg-main);
            color: var(--text-primary);
            border: 1px solid var(--accent);
            border-radius: 6px;
            padding: 2px 6px;
            font-size: 0.9rem;
            font-family: inherit;
            outline: none;
        }

        .btn-rename {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.85rem;
            padding: 2px;
        }

        .btn-rename:hover {
            color: var(--accent);
        }

        .doc-date { font-size: 0.75rem; color: var(--text-secondary); }
        
        .doc-actions { display: flex; flex-direction: column; gap: 6px; margin-top: auto; }
        
        .download-settings {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        .download-settings select {
            background: var(--bg-main);
            color: var(--text-primary);
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 0.7rem;
            border-radius: 4px;
            outline: none;
            padding: 1px 4px;
        }

        .btn-doc-action {
            width: 100%;
            padding: 8px 0;
            border-radius: 6px;
            border: none;
            font-size: 0.85rem;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .btn-edit { background: rgba(255,255,255,0.1); color: var(--text-primary); }
        .btn-download { background: rgba(59, 130, 246, 0.2); color: var(--accent); }

        .page-edit-controls {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 12px;
            z-index: 10;
        }

        .btn-action-circle {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--surface);
            opacity: 0.9;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }
        
        .btn-action-circle.danger { color: #ef4444; border-color: rgba(239, 68, 68, 0.3); }

        .add-more-card {
            min-width: 55px; height: 75px; border-radius: 6px;
            background: rgba(255,255,255,0.1); border: 2px dashed rgba(255,255,255,0.3);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; flex-shrink: 0; color: var(--text-secondary);
        }

        /* MODAL DE CONFIRMAÇÃO CUSTOMIZADO */
        .custom-modal-overlay {
            position: fixed;
            top:0; left:0; width:100vw; height:100vh;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .custom-modal-box {
            background: var(--surface);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 24px;
            max-width: 320px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .custom-modal-box h3 { font-size: 1.1rem; margin-bottom: 12px; }
        .custom-modal-box p { font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 20px; }
        .custom-modal-btns { display: flex; gap: 12px; }
        .btn-modal {
            flex: 1; padding: 10px; border-radius: 8px; border: none; font-weight: 600; font-size: 0.9rem; cursor: pointer;
        }
        .btn-modal-cancel { background: rgba(255,255,255,0.1); color: var(--text-primary); }
        .btn-modal-confirm { background: #ef4444; color: white; }
    </style>
</head>
<body>

    <div id="home-view" class="view-container">
        <header>
            <h1><i class="fa-solid fa-file-signature"></i> DocScan Pro</h1>
            <div class="header-actions">
                <button class="btn-theme-toggle" onclick="toggleTheme()" title="Alternar tema">
                    <i id="theme-icon" class="fa-solid fa-moon"></i>
                </button>
            </div>
        </header>
        <div class="home-content">
            <button class="btn-scan-main" onclick="openScanner()">
                <i class="fa-solid fa-camera"></i> Digitalizar Novo Documento
            </button>
            
            <h2 style="font-size: 1rem; margin-bottom: 15px; color: var(--text-secondary);">Seus Documentos</h2>
            
            <div id="docs-list" class="docs-grid">
                </div>
        </div>
    </div>

    <div id="scanner-view" class="view-container hide">
        <header>
            <div style="display:flex; align-items:center; gap:15px;">
                <button class="btn-secondary" style="width:36px; height:36px;" onclick="closeScanner()">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
                <h1><i class="fa-solid fa-file-signature"></i> Scanner</h1>
            </div>
            <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 2px;">
                <div class="badge-pages"><span id="page-count">0</span> Páginas</div>
                <div id="size-counter" style="font-size: 0.7rem; color: var(--text-secondary);">Est.: 0.00 MB</div>
            </div>
        </header>

        <div class="viewport-container">
            <div id="flash-element" class="flash-effect"></div>
            <div id="camera-error" class="camera-error-overlay hide">
                <i class="fa-solid fa-camera-slash"></i>
                <p>Precisamos de acesso à câmera para funcionar.</p>
                <button class="btn-retry-camera" onclick="startCamera()">Clique aqui para tentar novamente</button>
            </div>

            <video id="camera-feed" autoplay playsinline></video>
            <canvas id="capture-canvas" class="hide"></canvas>
            
            <div id="paper-sheet" class="paper-container format-a4 hide">
                <img id="preview-image" class="preview-image" />
            </div>

            <div id="scanner-overlay" class="scanner-overlay">
                <div class="viewfinder-guide">
                    <div class="corner-tr"></div>
                    <div class="corner-br"></div>
                    <div class="corner-bl"></div>
                </div>
                <div id="dynamic-helper" class="helper-text">Posicione o documento no quadro</div>
            </div>

            <div id="page-edit-controls" class="page-edit-controls hide">
                <button class="btn-action-circle" onclick="autoDetectAndCrop()" title="Auto-Cortar / Otimizar Bordas">
                    <i class="fa-solid fa-crop-simple"></i>
                </button>
                <button class="btn-action-circle" onclick="rotateCurrentPage()" title="Rotacionar 90º">
                    <i class="fa-solid fa-rotate-right"></i>
                </button>
                <button class="btn-action-circle danger" onclick="deleteCurrentPage()" title="Excluir Página">
                    <i class="fa-solid fa-trash"></i>
                </button>
            </div>
        </div>

        <div id="scale-panel" class="scale-control-panel hide">
            <div style="display:flex; align-items:center; gap:10px; width:100%;">
                <span>Tipo:</span>
                <select id="format-select" onchange="changeDocumentFormat(this.value)">
                    <option value="a4">A4</option>
                    <option value="carta">Carta</option>
                    <option value="oficio">Ofício</option>
                </select>
                <span>Ajuste:</span>
                <input type="range" id="scale-slider" min="40" max="100" value="100" oninput="adjustPageScale(this.value)">
                <span id="scale-value">100%</span>
            </div>
            
            <div class="filter-tabs">
                <button id="filter-btn-scanner" class="btn-filter-tab active" onclick="setPageFilter('scanner')">Scanner Padrão</button>
                <button id="filter-btn-bw" class="btn-filter-tab" onclick="setPageFilter('bw')">P&B Puro</button>
                <button id="filter-btn-color" class="btn-filter-tab" onclick="setPageFilter('color')">Color Otimizado</button>
                <button id="filter-btn-original" class="btn-filter-tab" onclick="setPageFilter('original')">Original</button>
            </div>
        </div>

        <div class="thumbnails-tray" id="thumbnails-tray">
            </div>

        <div class="control-panel">
            <button class="btn-secondary" id="btn-retake" onclick="backToCamera()" title="Voltar para câmera">
                <i class="fa-solid fa-camera"></i>
            </button>
            
            <div style="display: flex; gap: 10px; align-items: center;">
                <div class="btn-trigger-outer" id="btn-capture" onclick="capturePage()">
                    <div class="btn-trigger-inner"></div>
                </div>
                <button class="btn-secondary" id="btn-torch" onclick="toggleTorch()" title="Alternar Lanterna" style="width:44px; height:44px; font-size:1rem;">
                    <i class="fa-solid fa-bolt"></i>
                </button>
            </div>
            
            <button class="btn-save-pdf" id="btn-save" onclick="saveDocument()" disabled>
                <i class="fa-solid fa-check"></i> Concluir
            </button>
        </div>
    </div>

    <div id="custom-confirm-modal" class="custom-modal-overlay hide">
        <div class="custom-modal-box">
            <h3 id="modal-title">Confirmar Ação</h3>
            <p id="modal-text">Você tem certeza?</p>
            <div class="custom-modal-btns">
                <button class="btn-modal btn-modal-cancel" onclick="resolveCustomConfirm(false)">Cancelar</button>
                <button class="btn-modal btn-modal-confirm" onclick="resolveCustomConfirm(true)">Excluir</button>
            </div>
        </div>
    </div>

    <script>
        // --- ESTADO DA APLICAÇÃO ---
        let stream = null;
        let track = null;
        let isTorchOn = false;
        let currentPages = []; 
        let activePageIndex = -1; 
        let savedDocuments = []; 
        let editingDocId = null; 
        let brightnessInterval = null;
        let confirmPromiseResolver = null;

        // --- ELEMENTOS DO DOM ---
        const views = { home: document.getElementById('home-view'), scanner: document.getElementById('scanner-view') };
        const video = document.getElementById('camera-feed');
        const canvas = document.getElementById('capture-canvas');
        const paperSheet = document.getElementById('paper-sheet');
        const previewImage = document.getElementById('preview-image');
        const scannerOverlay = document.getElementById('scanner-overlay');
        const pageEditControls = document.getElementById('page-edit-controls');
        const scalePanel = document.getElementById('scale-panel');
        const scaleSlider = document.getElementById('scale-slider');
        const scaleValue = document.getElementById('scale-value');
        const formatSelect = document.getElementById('format-select');
        const thumbnailsTray = document.getElementById('thumbnails-tray');
        const btnSave = document.getElementById('btn-save');
        const btnCapture = document.getElementById('btn-capture');
        const pageCountEl = document.getElementById('page-count');
        const sizeCounterEl = document.getElementById('size-counter');
        const docsListEl = document.getElementById('docs-list');
        const flashElement = document.getElementById('flash-element');
        const cameraErrorOverlay = document.getElementById('camera-error');
        const dynamicHelper = document.getElementById('dynamic-helper');
        const customConfirmModal = document.getElementById('custom-confirm-modal');

        // --- CARREGAMENTO INICIAL (LOCALSTORAGE) ---
        window.addEventListener('DOMContentLoaded', () => {
            const localDocs = localStorage.getItem('docscan_pro_documents');
            if (localDocs) {
                try {
                    savedDocuments = JSON.parse(localDocs);
                } catch(e) {
                    savedDocuments = [];
                }
            }
            const savedTheme = localStorage.getItem('docscan_pro_theme');
            if (savedTheme === 'light') {
                document.body.classList.add('light-mode');
                document.getElementById('theme-icon').className = 'fa-solid fa-sun';
            }
            renderHomeDocs();
        });

        // --- CONTROLE DE TEMA ---
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            document.getElementById('theme-icon').className = isLight ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
            localStorage.setItem('docscan_pro_theme', isLight ? 'light' : 'dark');
        }

        // --- MODAL DE CONFIRMAÇÃO CUSTOMIZADO ---
        function askCustomConfirm(title, text) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-text').innerText = text;
            customConfirmModal.classList.remove('hide');
            return new Promise((resolve) => {
                confirmPromiseResolver = resolve;
            });
        }
        function resolveCustomConfirm(value) {
            customConfirmModal.classList.add('hide');
            if (confirmPromiseResolver) confirmPromiseResolver(value);
        }

        // --- NAVEGAÇÃO ---
        function openScanner(docToEdit = null) {
            views.home.classList.add('hide');
            views.scanner.classList.remove('hide');
            
            if (docToEdit) {
                editingDocId = docToEdit.id;
                currentPages = docToEdit.pages.map(p => ({
                    dataUrl: p.dataUrl,
                    scale: p.scale || 100,
                    format: p.format || 'a4',
                    filter: p.filter || 'scanner',
                    blobUrl: p.blobUrl || null
                }));
                // Gerar Blob URLs em tempo de execução para otimização de memória
                currentPages.forEach(p => {
                    if (!p.blobUrl) p.blobUrl = dataURLtoBlobURL(p.dataUrl);
                });
                updateThumbnails();
                if (currentPages.length > 0) {
                    viewPage(0);
                } else {
                    startCamera();
                }
            } else {
                editingDocId = Date.now();
                currentPages = [];
                updateThumbnails();
                startCamera();
            }
        }

        function closeScanner() {
            stopCamera();
            // Revogar Blob URLs existentes para liberar RAM
            currentPages.forEach(p => {
                if (p.blobUrl) URL.revokeObjectURL(p.blobUrl);
            });
            views.scanner.classList.add('hide');
            views.home.classList.remove('hide');
            renderHomeDocs();
        }

        // --- GERENCIAMENTO DE CÂMERA ---
        async function startCamera() {
            activePageIndex = -1;
            paperSheet.classList.add('hide');
            pageEditControls.classList.add('hide');
            scalePanel.classList.add('hide');
            video.classList.remove('hide');
            scannerOverlay.classList.remove('hide');
            btnCapture.classList.remove('hide');
            cameraErrorOverlay.classList.add('hide');

            updateThumbnailsUIActiveState();

            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } } 
                });
                video.srcObject = stream;
                track = stream.getVideoTracks()[0];
                isTorchOn = false;
                
                // Monitoramento dinâmico de luminosidade
                startBrightnessAnalysis();
            } catch (err) {
                console.error("Erro ao acessar a câmera: ", err);
                cameraErrorOverlay.classList.remove('hide');
            }
        }

        function stopCamera() {
            stopBrightnessAnalysis();
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
                track = null;
            }
        }

        function backToCamera() {
            startCamera();
        }

        // --- INTERAÇÃO COM HARDWARE: LANTERNA ---
        async function toggleTorch() {
            if (!track) return;
            try {
                const capabilities = track.getCapabilities();
                if (capabilities.torch) {
                    isTorchOn = !isTorchOn;
                    await track.applyConstraints({ advanced: [{ torch: isTorchOn }] });
                }
            } catch (e) {
                console.warn("Lanterna não suportada neste dispositivo/modo.");
            }
        }

        // --- ANÁLISE DINÂMICA DE LUMINOSIDADE ---
        function startBrightnessAnalysis() {
            if (brightnessInterval) clearInterval(brightnessInterval);
            const dummyCanvas = document.createElement('canvas');
            const dummyCtx = dummyCanvas.getContext('2d');
            dummyCanvas.width = 20;
            dummyCanvas.height = 20;

            brightnessInterval = setInterval(() => {
                if (!stream || activePageIndex !== -1) return;
                try {
                    dummyCtx.drawImage(video, 0, 0, 20, 20);
                    const imgData = dummyCtx.getImageData(0, 0, 20, 20);
                    let colorSum = 0;
                    for(let i = 0; i < imgData.data.length; i += 4) {
                        colorSum += (imgData.data[i] + imgData.data[i+1] + imgData.data[i+2]) / 3;
                    }
                    const brightness = colorSum / (20 * 20);
                    if (brightness < 45) {
                        dynamicHelper.innerText = "Ambiente escuro, considere ligar uma luz";
                        dynamicHelper.classList.add('warning');
                    } else {
                        dynamicHelper.innerText = "Posicione o documento no quadro";
                        dynamicHelper.classList.remove('warning');
                    }
                } catch(e) {}
            }, 2000);
        }

        function stopBrightnessAnalysis() {
            if (brightnessInterval) {
                clearInterval(brightnessInterval);
                brightnessInterval = null;
            }
        }

        // --- AUXILIARES DE CONVERSÃO (BLOB URL) ---
        function dataURLtoBlobURL(dataurl) {
            const arr = dataurl.split(','), mime = arr[0].match(/:(.*?);/)[1];
            const bstr = atob(arr[1]), n = bstr.length, u8arr = new Uint8Array(n);
            let i = n;
            while(i--){
                u8arr[i] = bstr.charCodeAt(i);
            }
            const blob = new Blob([u8arr], {type:mime});
            return URL.createObjectURL(blob);
        }

        // --- CAPTURA ---
        function capturePage() {
            if (activePageIndex !== -1) return;

            // Animação de Flash Visual
            flashElement.style.animation = 'none';
            setTimeout(() => { flashElement.style.animation = 'flashAnim 0.4s ease-out'; }, 10);

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const imgData = canvas.toDataURL('image/jpeg', 0.85);
            const blobUrl = dataURLtoBlobURL(imgData);

            currentPages.push({ 
                dataUrl: imgData, 
                blobUrl: blobUrl,
                scale: 100, 
                format: 'a4',
                filter: 'scanner' 
            });
            
            updateThumbnails();
            viewPage(currentPages.length - 1);
        }

        // --- VISUALIZAÇÃO E FILTROS ---
        function viewPage(index) {
            stopCamera();
            activePageIndex = index;
            
            video.classList.add('hide');
            scannerOverlay.classList.add('hide');
            btnCapture.classList.add('hide');

            const page = currentPages[index];
            
            // Renderização otimizada por Blob URL
            previewImage.src = page.blobUrl || page.dataUrl;
            previewImage.style.transform = `scale(${page.scale / 100})`;
            
            // Aplicação visual do Filtro correspondente
            setFilterUIState(page.filter || 'scanner');
            
            const currentFormat = page.format || 'a4';
            formatSelect.value = currentFormat;
            paperSheet.className = `paper-container format-${currentFormat}`;
            paperSheet.classList.remove('hide');
            
            pageEditControls.classList.remove('hide');
            
            scaleSlider.value = page.scale || 100;
            scaleValue.innerText = (page.scale || 100) + '%';
            scalePanel.classList.remove('hide');

            updateThumbnailsUIActiveState();
        }

        function setPageFilter(filterName) {
            if (activePageIndex === -1) return;
            currentPages[activePageIndex].filter = filterName;
            setFilterUIState(filterName);
        }

        function setFilterUIState(filterName) {
            previewImage.className = `preview-image filter-${filterName}`;
            document.querySelectorAll('.btn-filter-tab').forEach(btn => {
                btn.classList.remove('active');
            });
            const activeBtn = document.getElementById(`filter-btn-${filterName}`);
            if (activeBtn) activeBtn.classList.add('active');
        }

        function changeDocumentFormat(value) {
            if (activePageIndex === -1) return;
            currentPages[activePageIndex].format = value;
            paperSheet.className = `paper-container format-${value}`;
        }

        function adjustPageScale(value) {
            if (activePageIndex === -1) return;
            currentPages[activePageIndex].scale = parseInt(value);
            scaleValue.innerText = value + '%';
            
            previewImage.style.transform = `scale(${value / 100})`;
            
            const activeBadge = thumbnailsTray.querySelector('.active-thumb .thumb-scale-badge');
            if (activeBadge) activeBadge.innerText = value + '%';
        }

        // --- ALGORITMO DE CORTE / DETECÇÃO AUTOMÁTICA DE BORDAS ---
        function autoDetectAndCrop() {
            if (activePageIndex === -1) return;
            
            const page = currentPages[activePageIndex];
            const img = new Image();
            img.onload = function() {
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);
                
                const srcData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = srcData.data;
                
                // Algoritmo de varredura inteligente para aproximar a caixa delimitadora do documento real (eliminando cantos mortos escuros)
                let minX = canvas.width, maxX = 0, minY = canvas.height, maxY = 0;
                const sampleStep = 4; 
                
                for (let y = 0; y < canvas.height; y += sampleStep) {
                    for (let x = 0; x < canvas.width; x += sampleStep) {
                        const index = (y * canvas.width + x) * 4;
                        const r = data[index];
                        const g = data[index+1];
                        const b = data[index+2];
                        const brightness = (r + g + b) / 3;
                        
                        // Um documento em papel normalmente possui pixels mais claros do que o plano de fundo escuro estruturado
                        if (brightness > 70) {
                            if (x < minX) minX = x;
                            if (x > maxX) maxX = x;
                            if (y < minY) minY = y;
                            if (y > maxY) maxY = y;
                        }
                    }
                }
                
                // Adiciona uma margem de segurança de 15px para evitar cortes agressivos nas bordas do texto
                const padding = 15;
                minX = Math.max(0, minX - padding);
                minY = Math.max(0, minY - padding);
                maxX = Math.min(canvas.width, maxX + padding);
                maxY = Math.min(canvas.height, maxY + padding);
                
                const cropW = maxX - minX;
                const cropH = maxY - minY;
                
                if (cropW > 100 && cropH > 100) {
                    const targetCanvas = document.createElement('canvas');
                    targetCanvas.width = cropW;
                    targetCanvas.height = cropH;
                    const targetCtx = targetCanvas.getContext('2d');
                    
                    targetCtx.drawImage(img, minX, minY, cropW, cropH, 0, 0, cropW, cropH);
                    
                    const croppedDataUrl = targetCanvas.toDataURL('image/jpeg', 0.85);
                    
                    // Atualiza a página ativa
                    URL.revokeObjectURL(page.blobUrl);
                    page.dataUrl = croppedDataUrl;
                    page.blobUrl = dataURLtoBlobURL(croppedDataUrl);
                    
                    viewPage(activePageIndex);
                    updateThumbnails();
                }
            };
            img.src = page.dataUrl;
        }

        function rotateCurrentPage() {
            if (activePageIndex === -1) return;
            
            const page = currentPages[activePageIndex];
            const img = new Image();
            img.onload = function() {
                canvas.width = img.height;
                canvas.height = img.width;
                const ctx = canvas.getContext('2d');
                
                ctx.translate(canvas.width / 2, canvas.height / 2);
                ctx.rotate(Math.PI / 2);
                ctx.drawImage(img, -img.width / 2, -img.height / 2);
                
                const newImgData = canvas.toDataURL('image/jpeg', 0.85);
                
                URL.revokeObjectURL(page.blobUrl);
                page.dataUrl = newImgData;
                page.blobUrl = dataURLtoBlobURL(newImgData);
                
                previewImage.src = page.blobUrl;
                updateThumbnails();
            };
            img.src = page.dataUrl;
        }

        async function deleteCurrentPage() {
            if (activePageIndex === -1) return;
            
            const confirmDelete = await askCustomConfirm("Remover Página", "Deseja remover esta página permanentemente do seu documento?");
            if (confirmDelete) {
                URL.revokeObjectURL(currentPages[activePageIndex].blobUrl);
                currentPages.splice(activePageIndex, 1);
                updateThumbnails();
                
                if (currentPages.length > 0) {
                    viewPage(Math.max(0, activePageIndex - 1));
                } else {
                    startCamera();
                }
            }
        }

        // --- SISTEMA DE THUMBNAILS COM DRAG & DROP NATIVO REORGANIZÁVEL ---
        function updateThumbnails() {
            thumbnailsTray.innerHTML = '';
            pageCountEl.innerText = currentPages.length;
            btnSave.disabled = currentPages.length === 0;

            // Atualiza o contador estimado em MB
            const estimatedMB = (currentPages.length * 0.22).toFixed(2);
            sizeCounterEl.innerText = `Est.: ${estimatedMB} MB`;

            currentPages.forEach((page, index) => {
                const wrapper = document.createElement('div');
                wrapper.className = `thumb-wrapper ${index === activePageIndex ? 'active-thumb' : ''}`;
                wrapper.setAttribute('draggable', 'true');
                wrapper.setAttribute('data-index', index);
                
                // Eventos de Arrastar e Soltar
                wrapper.addEventListener('dragstart', handleDragStart);
                wrapper.addEventListener('dragover', handleDragOver);
                wrapper.addEventListener('drop', handleDrop);
                
                wrapper.onclick = (e) => {
                    if (e.target.tagName !== 'DIV' && e.target.parentNode.className.includes('thumb-wrapper')) {
                        viewPage(index);
                    }
                };
                wrapper.addEventListener('click', () => viewPage(index));
                
                const img = document.createElement('img');
                img.src = page.blobUrl || page.dataUrl;
                
                const badge = document.createElement('div');
                badge.className = 'thumb-scale-badge';
                badge.innerText = (page.scale || 100) + '%';

                wrapper.appendChild(img);
                wrapper.appendChild(badge);
                thumbnailsTray.appendChild(wrapper);
            });

            const addBtn = document.createElement('div');
            addBtn.className = 'add-more-card';
            addBtn.innerHTML = '<i class="fa-solid fa-plus"></i>';
            addBtn.onclick = () => startCamera();
            thumbnailsTray.appendChild(addBtn);
        }

        function updateThumbnailsUIActiveState() {
            const thumbs = thumbnailsTray.querySelectorAll('.thumb-wrapper');
            thumbs.forEach((t, i) => {
                if(i === activePageIndex) t.classList.add('active-thumb');
                else t.classList.remove('active-thumb');
            });
        }

        // Logica interna do Drag and Drop
        let dragSrcIndex = null;
        function handleDragStart(e) {
            dragSrcIndex = this.getAttribute('data-index');
            e.dataTransfer.effectAllowed = 'move';
        }
        function handleDragOver(e) {
            if (e.preventDefault) e.preventDefault();
            return false;
        }
        function handleDrop(e) {
            e.stopPropagation();
            const targetIndex = this.getAttribute('data-index');
            if (dragSrcIndex !== null && dragSrcIndex !== targetIndex) {
                // Reordena o array principal de paginas
                const movedItem = currentPages.splice(dragSrcIndex, 1)[0];
                currentPages.splice(targetIndex, 0, movedItem);
                updateThumbnails();
                
                // Sincroniza a visualização com o novo índice
                if (activePageIndex == dragSrcIndex) {
                    viewPage(parseInt(targetIndex));
                } else {
                    viewPage(activePageIndex);
                }
            }
        }

        // --- DOCUMENTOS E PERSISTÊNCIA ---
        function saveDocument() {
            if (currentPages.length === 0) return;

            const existingIndex = savedDocuments.findIndex(d => d.id === editingDocId);
            const isEditing = existingIndex > -1;
            
            // Remove referências de BlobUrl temporárias ao persistir strings puras no LocalStorage
            const sanitizedPages = currentPages.map(p => ({
                dataUrl: p.dataUrl,
                scale: p.scale,
                format: p.format,
                filter: p.filter
            }));

            const docObj = {
                id: editingDocId,
                title: isEditing ? savedDocuments[existingIndex].title : `Doc #${savedDocuments.length + 1}`,
                date: isEditing ? savedDocuments[existingIndex].date : new Date().toLocaleString('pt-BR'),
                pages: sanitizedPages
            };

            if (isEditing) {
                savedDocuments[existingIndex] = docObj;
            } else {
                savedDocuments.push(docObj);
            }

            // Gravação Local Segura
            localStorage.setItem('docscan_pro_documents', JSON.stringify(savedDocuments));
            closeScanner();
        }

        function renameDocument(id, event) {
            event.stopPropagation(); 
            const doc = savedDocuments.find(d => d.id === id);
            if (!doc) return;
            
            const card = event.target.closest('.doc-card');
            const titleEl = card.querySelector('.doc-title');
            const originalTitle = doc.title;
            
            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'inline-rename-input';
            input.value = originalTitle;
            
            const finishRename = () => {
                const newName = input.value.trim();
                if (newName && newName !== "") {
                    doc.title = newName;
                    localStorage.setItem('docscan_pro_documents', JSON.stringify(savedDocuments));
                }
                renderHomeDocs();
            };
            
            input.onblur = finishRename;
            input.onkeydown = (e) => {
                if (e.key === 'Enter') finishRename();
                if (e.key === 'Escape') renderHomeDocs();
            };
            
            titleEl.innerHTML = '';
            titleEl.appendChild(input);
            input.focus();
            input.select();
        }

        function renderHomeDocs() {
            docsListEl.innerHTML = '';
            
            if (savedDocuments.length === 0) {
                docsListEl.innerHTML = '<p style="color:var(--text-secondary); grid-column:1/-1; text-align:center; padding: 20px;">Nenhum documento armazenado.</p>';
                return;
            }

            savedDocuments.forEach(doc => {
                const card = document.createElement('div');
                card.className = 'doc-card';
                
                card.innerHTML = `
                    <img src="${doc.pages[0].dataUrl}" class="doc-preview" />
                    <div class="doc-title-container">
                        <div class="doc-title" title="${doc.title}">${doc.title}</div>
                        <button class="btn-rename" onclick="renameDocument(${doc.id}, event)" title="Editar nome">
                            <i class="fa-solid fa-pen-to-square"></i>
                        </button>
                    </div>
                    <div class="doc-date">${doc.pages.length} pág(s) • ${doc.date}</div>
                    <div class="doc-actions">
                        <div class="download-settings">
                            <span>Qualidade:</span>
                            <select id="quality-${doc.id}">
                                <option value="1.0">Máxima</option>
                                <option value="0.55">Compacto</option>
                            </select>
                        </div>
                        <button class="btn-doc-action btn-edit" onclick="editDocument(${doc.id})"><i class="fa-solid fa-pen"></i> Editar</button>
                        <button class="btn-doc-action btn-download" onclick="downloadPDF(${doc.id})"><i class="fa-solid fa-download"></i> Baixar PDF</button>
                    </div>
                `;
                docsListEl.appendChild(card);
            });
        }

        function editDocument(id) {
            const doc = savedDocuments.find(d => d.id === id);
            if (doc) openScanner(doc);
        }

        async function downloadPDF(docId) {
            const targetDoc = savedDocuments.find(d => d.id === docId);
            if (!targetDoc || targetDoc.pages.length === 0) return;

            const qualitySelector = document.getElementById(`quality-${docId}`);
            const compressionQuality = qualitySelector ? parseFloat(qualitySelector.value) : 1.0;

            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');
            const pdfWidth = pdf.internal.pageSize.getWidth();
            const pdfHeight = pdf.internal.pageSize.getHeight();

            for (let i = 0; i < targetDoc.pages.length; i++) {
                if (i > 0) pdf.addPage();
                
                const page = targetDoc.pages[i];
                
                await new Promise((resolve) => {
                    const img = new Image();
                    img.onload = () => {
                        // Renderiza o filtro físico definitivo no Canvas antes da exportação para o PDF
                        const exportCanvas = document.createElement('canvas');
                        exportCanvas.width = img.width;
                        exportCanvas.height = img.height;
                        const exportCtx = exportCanvas.getContext('2d');
                        
                        // Associa os filtros de renderização idênticos à visualização da tela
                        if (page.filter === 'scanner') exportCtx.filter = 'brightness(1.22) contrast(1.85) grayscale(0.4)';
                        else if (page.filter === 'bw') exportCtx.filter = 'contrast(3) grayscale(1) brightness(1.1)';
                        else if (page.filter === 'color') exportCtx.filter = 'contrast(1.4) brightness(1.15) saturate(1.3)';
                        else exportCtx.filter = 'none';

                        exportCtx.drawImage(img, 0, 0);
                        exportCtx.filter = 'none';

                        const processingDataUrl = exportCanvas.toDataURL('image/jpeg', compressionQuality);
                        
                        const ratio = Math.min(pdfWidth / img.width, pdfHeight / img.height);
                        const scaleMultiplier = (page.scale || 100) / 100;
                        const finalWidth = img.width * ratio * scaleMultiplier;
                        const finalHeight = img.height * ratio * scaleMultiplier;
                        
                        const x = (pdfWidth - finalWidth) / 2;
                        const y = (pdfHeight - finalHeight) / 2;
                        
                        pdf.addImage(processingDataUrl, 'JPEG', x, y, finalWidth, finalHeight);
                        resolve();
                    };
                    img.src = page.dataUrl;
                });
            }

            pdf.save(`${targetDoc.title}.pdf`);
        }

        // --- EXPOSIÇÃO GLOBAL PARA COMPATIBILIDADE ---
        window.openScanner = openScanner;
        window.closeScanner = closeScanner;
        window.backToCamera = backToCamera;
        window.capturePage = capturePage;
        window.changeDocumentFormat = changeDocumentFormat;
        window.adjustPageScale = adjustPageScale;
        window.rotateCurrentPage = rotateCurrentPage;
        window.deleteCurrentPage = deleteCurrentPage;
        window.renameDocument = renameDocument;
        window.editDocument = editDocument;
        window.downloadPDF = downloadPDF;
        window.toggleTheme = toggleTheme;
        window.toggleTorch = toggleTorch;
        window.setPageFilter = setPageFilter;
        window.autoDetectAndCrop = autoDetectAndCrop;
        window.resolveCustomConfirm = resolveCustomConfirm;
    </script>
</body>
</html>
