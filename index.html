<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DocScan Pro — Premium Scanner</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        :root {
            --bg-main: #090a0f;
            --surface: #161824;
            --accent: #3b82f6;
            --accent-gradient: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(22, 24, 36, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 10;
        }

        header h1 {
            font-size: 1.1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        header h1 i {
            color: var(--accent);
        }

        .badge-pages {
            background: rgba(59, 130, 246, 0.15);
            color: var(--accent);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .viewport-container {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            overflow: hidden;
            min-height: 0;
        }

        video, canvas, .preview-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            position: absolute;
        }
        
        video {
            object-fit: cover;
        }

        .preview-image {
            transition: transform 0.2s ease;
            transform-origin: center;
        }

        .scanner-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .viewfinder-guide {
            width: 100%;
            height: 80%;
            max-width: 340px;
            max-height: 480px;
            border: 2px dashed rgba(255, 255, 255, 0.4);
            border-radius: 16px;
            position: relative;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.55);
        }

        .viewfinder-guide::before {
            content: '';
            position: absolute;
            width: 30px;
            height: 30px;
            border: 4px solid var(--accent);
            top: -4px; left: -4px;
            border-right: none; border-bottom: none;
            border-top-left-radius: 16px;
        }

        .viewfinder-guide .corner-br {
            position: absolute;
            bottom: -4px; right: -4px;
            width: 30px;
            height: 30px;
            border: 4px solid var(--accent);
            border-left: none; border-top: none;
            border-bottom-right-radius: 16px;
        }

        .viewfinder-guide .corner-tr {
            position: absolute;
            top: -4px; right: -4px;
            width: 30px;
            height: 30px;
            border: 4px solid var(--accent);
            border-left: none; border-bottom: none;
            border-top-right-radius: 16px;
        }

        .viewfinder-guide .corner-bl {
            position: absolute;
            bottom: -4px; left: -4px;
            width: 30px;
            height: 30px;
            border: 4px solid var(--accent);
            border-right: none; border-top: none;
            border-bottom-left-radius: 16px;
        }

        .helper-text {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.75);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .scale-control-panel {
            background: #11131e;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.85rem;
            z-index: 10;
        }

        .scale-control-panel input[type="range"] {
            flex: 1;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .thumbnails-tray {
            height: 95px;
            background: #0d0f17;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 20px;
            overflow-x: auto;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .thumb-wrapper {
            position: relative;
            min-width: 55px;
            height: 75px;
            border-radius: 6px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
            flex-shrink: 0;
        }

        .thumb-wrapper.active-thumb {
            border-color: var(--accent);
            transform: scale(1.05);
        }

        .thumb-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .thumb-scale-badge {
            position: absolute;
            bottom: 2px;
            right: 2px;
            background: rgba(0,0,0,0.8);
            color: #fff;
            font-size: 9px;
            padding: 2px 4px;
            border-radius: 3px;
        }

        .control-panel {
            background: var(--surface);
            padding: 15px 30px 25px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 10;
        }

        .btn-secondary {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .btn-trigger-outer {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: 4px solid #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .btn-trigger-inner {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background: #fff;
            transition: transform 0.1s;
        }
        
        .btn-trigger-outer:active .btn-trigger-inner {
            transform: scale(0.9);
        }

        .btn-save-pdf {
            background: var(--accent-gradient);
            color: white;
            padding: 14px 24px;
            border-radius: 25px;
            font-weight: 600;
            font-size: 0.95rem;
            border: none;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-save-pdf:disabled, .btn-secondary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        .hide { display: none !important; }
        
        .view-container { 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            width: 100vw; 
            overflow: hidden; 
        }

        .home-content { 
            padding: 20px; 
            overflow-y: auto; 
            flex: 1; 
        }
        
        .btn-scan-main {
            background: var(--accent-gradient);
            color: white;
            border: none;
            padding: 16px 24px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 600;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .docs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            padding-bottom: 20px;
        }

        .doc-card {
            background: var(--surface);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .doc-preview {
            width: 100%;
            height: 120px;
            background: #000;
            border-radius: 8px;
            object-fit: cover;
        }

        .doc-title-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 4px;
        }

        .doc-title { 
            font-size: 0.9rem; 
            font-weight: 600; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis;
            flex: 1;
        }

        .btn-rename {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.85rem;
            padding: 2px;
        }

        .btn-rename:hover {
            color: var(--accent);
        }

        .doc-date { font-size: 0.75rem; color: var(--text-secondary); }
        
        .doc-actions { display: flex; gap: 8px; margin-top: auto; }
        .btn-doc-action {
            flex: 1;
            padding: 8px 0;
            border-radius: 6px;
            border: none;
            font-size: 0.85rem;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-edit { background: rgba(255,255,255,0.1); color: white; }
        .btn-download { background: rgba(59, 130, 246, 0.2); color: var(--accent); }

        .page-edit-controls {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 12px;
            z-index: 10;
        }

        .btn-action-circle {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(22, 24, 36, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }
        
        .btn-action-circle.danger { color: #ef4444; border-color: rgba(239, 68, 68, 0.3); }

        .add-more-card {
            min-width: 55px; height: 75px; border-radius: 6px;
            background: rgba(255,255,255,0.1); border: 2px dashed rgba(255,255,255,0.3);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; flex-shrink: 0; color: var(--text-secondary);
        }
    </style>
</head>
<body>

    <div id="home-view" class="view-container">
        <header>
            <h1><i class="fa-solid fa-file-signature"></i> DocScan Pro</h1>
        </header>
        <div class="home-content">
            <button class="btn-scan-main" onclick="openScanner()">
                <i class="fa-solid fa-camera"></i> Digitalizar Novo Documento
            </button>
            
            <h2 style="font-size: 1rem; margin-bottom: 15px; color: var(--text-secondary);">Seus Documentos</h2>
            
            <div id="docs-list" class="docs-grid">
                </div>
        </div>
    </div>

    <div id="scanner-view" class="view-container hide">
        <header>
            <div style="display:flex; align-items:center; gap:15px;">
                <button class="btn-secondary" style="width:36px; height:36px;" onclick="closeScanner()">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
                <h1><i class="fa-solid fa-file-signature"></i> Scanner</h1>
            </div>
            <div class="badge-pages"><span id="page-count">0</span> Páginas</div>
        </header>

        <div class="viewport-container">
            <video id="camera-feed" autoplay playsinline></video>
            <canvas id="capture-canvas" class="hide"></canvas>
            <img id="preview-image" class="preview-image hide" />

            <div id="scanner-overlay" class="scanner-overlay">
                <div class="viewfinder-guide">
                    <div class="corner-tr"></div>
                    <div class="corner-br"></div>
                    <div class="corner-bl"></div>
                </div>
                <div class="helper-text">Posicione o documento no quadro</div>
            </div>

            <div id="page-edit-controls" class="page-edit-controls hide">
                <button class="btn-action-circle" onclick="rotateCurrentPage()" title="Rotacionar 90º">
                    <i class="fa-solid fa-rotate-right"></i>
                </button>
                <button class="btn-action-circle danger" onclick="deleteCurrentPage()" title="Excluir Página">
                    <i class="fa-solid fa-trash"></i>
                </button>
            </div>
        </div>

        <div id="scale-panel" class="scale-control-panel hide">
            <span>Ajuste de Dimensão:</span>
            <input type="range" id="scale-slider" min="40" max="100" value="100" oninput="adjustPageScale(this.value)">
            <span id="scale-value">100%</span>
        </div>

        <div class="thumbnails-tray" id="thumbnails-tray">
            </div>

        <div class="control-panel">
            <button class="btn-secondary" id="btn-retake" onclick="backToCamera()" title="Voltar para câmera">
                <i class="fa-solid fa-camera"></i>
            </button>
            
            <div style="width: 72px; height: 72px; display: flex; align-items: center; justify-content: center;">
                <div class="btn-trigger-outer" id="btn-capture" onclick="capturePage()">
                    <div class="btn-trigger-inner"></div>
                </div>
            </div>
            
            <button class="btn-save-pdf" id="btn-save" onclick="saveDocument()" disabled>
                <i class="fa-solid fa-check"></i> Concluir
            </button>
        </div>
    </div>

    <script>
        // --- ESTADO DA APLICAÇÃO ---
        let stream = null;
        let currentPages = []; 
        let activePageIndex = -1; 
        let savedDocuments = []; 
        let editingDocId = null; 

        // --- ELEMENTOS DO DOM ---
        const views = { home: document.getElementById('home-view'), scanner: document.getElementById('scanner-view') };
        const video = document.getElementById('camera-feed');
        const canvas = document.getElementById('capture-canvas');
        const previewImage = document.getElementById('preview-image');
        const scannerOverlay = document.getElementById('scanner-overlay');
        const pageEditControls = document.getElementById('page-edit-controls');
        const scalePanel = document.getElementById('scale-panel');
        const scaleSlider = document.getElementById('scale-slider');
        const scaleValue = document.getElementById('scale-value');
        const thumbnailsTray = document.getElementById('thumbnails-tray');
        const btnSave = document.getElementById('btn-save');
        const btnCapture = document.getElementById('btn-capture');
        const pageCountEl = document.getElementById('page-count');
        const docsListEl = document.getElementById('docs-list');

        // --- NAVEGAÇÃO ---
        function openScanner(docToEdit = null) {
            views.home.classList.add('hide');
            views.scanner.classList.remove('hide');
            
            if (docToEdit) {
                editingDocId = docToEdit.id;
                currentPages = docToEdit.pages.map(p => typeof p === 'string' ? { dataUrl: p, scale: 100 } : { ...p });
                updateThumbnails();
                if (currentPages.length > 0) {
                    viewPage(0);
                } else {
                    startCamera();
                }
            } else {
                editingDocId = Date.now();
                currentPages = [];
                updateThumbnails();
                startCamera();
            }
        }

        function closeScanner() {
            stopCamera();
            views.scanner.classList.add('hide');
            views.home.classList.remove('hide');
            renderHomeDocs();
        }

        // --- GERENCIAMENTO DE CÂMERA ---
        async function startCamera() {
            activePageIndex = -1;
            previewImage.classList.add('hide');
            pageEditControls.classList.add('hide');
            scalePanel.classList.add('hide');
            video.classList.remove('hide');
            scannerOverlay.classList.remove('hide');
            btnCapture.classList.remove('hide');

            updateThumbnailsUIActiveState();

            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } } 
                });
                video.srcObject = stream;
            } catch (err) {
                console.error("Erro ao acessar a câmera: ", err);
            }
        }

        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
        }

        function backToCamera() {
            startCamera();
        }

        // --- CAPTURA COM EFEITO DE SCANNER REALISTA ---
        function capturePage() {
            if (activePageIndex !== -1) return;

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            
            // Filtro inteligente de Scanner: Realça o fundo branco e acentua o texto preto removendo sombras estáticas
            ctx.filter = 'brightness(1.15) contrast(1.65) grayscale(0.1)';
            
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            ctx.filter = 'none'; // Reseta o filtro do contexto do canvas
            
            const imgData = canvas.toDataURL('image/jpeg', 0.85);
            currentPages.push({ dataUrl: imgData, scale: 100 });
            
            updateThumbnails();
            viewPage(currentPages.length - 1);
        }

        // --- EDIÇÃO & VISUALIZAÇÃO ---
        function viewPage(index) {
            stopCamera();
            activePageIndex = index;
            
            video.classList.add('hide');
            scannerOverlay.classList.add('hide');
            btnCapture.classList.add('hide');

            const page = currentPages[index];
            previewImage.src = page.dataUrl;
            previewImage.style.transform = `scale(${page.scale / 100})`;
            previewImage.classList.remove('hide');
            
            pageEditControls.classList.remove('hide');
            
            scaleSlider.value = page.scale || 100;
            scaleValue.innerText = (page.scale || 100) + '%';
            scalePanel.classList.remove('hide');

            updateThumbnailsUIActiveState();
        }

        function adjustPageScale(value) {
            if (activePageIndex === -1) return;
            currentPages[activePageIndex].scale = parseInt(value);
            scaleValue.innerText = value + '%';
            
            previewImage.style.transform = `scale(${value / 100})`;
            
            const activeBadge = thumbnailsTray.querySelector('.active-thumb .thumb-scale-badge');
            if (activeBadge) activeBadge.innerText = value + '%';
        }

        function rotateCurrentPage() {
            if (activePageIndex === -1) return;
            
            const pageData = currentPages[activePageIndex].dataUrl;
            const img = new Image();
            img.onload = function() {
                canvas.width = img.height;
                canvas.height = img.width;
                const ctx = canvas.getContext('2d');
                
                ctx.translate(canvas.width / 2, canvas.height / 2);
                ctx.rotate(Math.PI / 2);
                ctx.drawImage(img, -img.width / 2, -img.height / 2);
                
                const newImgData = canvas.toDataURL('image/jpeg', 0.85);
                currentPages[activePageIndex].dataUrl = newImgData;
                previewImage.src = newImgData;
                updateThumbnails();
            };
            img.src = pageData;
        }

        function deleteCurrentPage() {
            if (activePageIndex === -1) return;
            
            if(confirm("Deseja remover esta página permanentemente?")) {
                currentPages.splice(activePageIndex, 1);
                updateThumbnails();
                
                if (currentPages.length > 0) {
                    viewPage(Math.max(0, activePageIndex - 1));
                } else {
                    startCamera();
                }
            }
        }

        // --- SISTEMA DE THUMBNAILS ---
        function updateThumbnails() {
            thumbnailsTray.innerHTML = '';
            pageCountEl.innerText = currentPages.length;
            btnSave.disabled = currentPages.length === 0;

            currentPages.forEach((page, index) => {
                const wrapper = document.createElement('div');
                wrapper.className = `thumb-wrapper ${index === activePageIndex ? 'active-thumb' : ''}`;
                wrapper.onclick = () => viewPage(index);
                
                const img = document.createElement('img');
                img.src = page.dataUrl;
                
                const badge = document.createElement('div');
                badge.className = 'thumb-scale-badge';
                badge.innerText = page.scale + '%';

                wrapper.appendChild(img);
                wrapper.appendChild(badge);
                thumbnailsTray.appendChild(wrapper);
            });

            const addBtn = document.createElement('div');
            addBtn.className = 'add-more-card';
            addBtn.innerHTML = '<i class="fa-solid fa-plus"></i>';
            addBtn.onclick = () => startCamera();
            thumbnailsTray.appendChild(addBtn);
        }

        function updateThumbnailsUIActiveState() {
            const thumbs = thumbnailsTray.querySelectorAll('.thumb-wrapper');
            thumbs.forEach((t, i) => {
                if(i === activePageIndex) t.classList.add('active-thumb');
                else t.classList.remove('active-thumb');
            });
        }

        // --- DOCUMENTOS E PERSISTÊNCIA ---
        function saveDocument() {
            if (currentPages.length === 0) return;

            const existingIndex = savedDocuments.findIndex(d => d.id === editingDocId);
            const isEditing = existingIndex > -1;
            
            const docObj = {
                id: editingDocId,
                title: isEditing ? savedDocuments[existingIndex].title : `Doc #${savedDocuments.length + 1}`,
                date: isEditing ? savedDocuments[existingIndex].date : new Date().toLocaleString('pt-BR'),
                pages: JSON.parse(JSON.stringify(currentPages))
            };

            if (isEditing) {
                savedDocuments[existingIndex] = docObj;
            } else {
                savedDocuments.push(docObj);
            }

            closeScanner();
        }

        function renameDocument(id, event) {
            event.stopPropagation(); 
            const doc = savedDocuments.find(d => d.id === id);
            if (!doc) return;
            
            const newName = prompt("Insira um novo nome para o documento:", doc.title);
            if (newName && newName.trim() !== "") {
                doc.title = newName.trim();
                renderHomeDocs();
            }
        }

        function renderHomeDocs() {
            docsListEl.innerHTML = '';
            
            if (savedDocuments.length === 0) {
                docsListEl.innerHTML = '<p style="color:var(--text-secondary); grid-column:1/-1; text-align:center; padding: 20px;">Nenhum documento armazenado.</p>';
                return;
            }

            savedDocuments.forEach(doc => {
                const card = document.createElement('div');
                card.className = 'doc-card';
                
                card.innerHTML = `
                    <img src="${doc.pages[0].dataUrl}" class="doc-preview" />
                    <div class="doc-title-container">
                        <div class="doc-title" title="${doc.title}">${doc.title}</div>
                        <button class="btn-rename" onclick="renameDocument(${doc.id}, event)" title="Editar nome">
                            <i class="fa-solid fa-pen-to-square"></i>
                        </button>
                    </div>
                    <div class="doc-date">${doc.pages.length} pág(s) • ${doc.date}</div>
                    <div class="doc-actions">
                        <button class="btn-doc-action btn-edit" onclick="editDocument(${doc.id})"><i class="fa-solid fa-pen"></i> Editar</button>
                        <button class="btn-doc-action btn-download" onclick="downloadPDF(${doc.id})"><i class="fa-solid fa-download"></i> Baixar</button>
                    </div>
                `;
                docsListEl.appendChild(card);
            });
        }

        function editDocument(id) {
            const doc = savedDocuments.find(d => d.id === id);
            if (doc) openScanner(doc);
        }

        async function downloadPDF(docId) {
            const targetDoc = savedDocuments.find(d => d.id === docId);
            if (!targetDoc || targetDoc.pages.length === 0) return;

            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');
            const pdfWidth = pdf.internal.pageSize.getWidth();
            const pdfHeight = pdf.internal.pageSize.getHeight();

            for (let i = 0; i < targetDoc.pages.length; i++) {
                if (i > 0) pdf.addPage();
                
                const page = targetDoc.pages[i];
                
                await new Promise((resolve) => {
                    const img = new Image();
                    img.onload = () => {
                        const ratio = Math.min(pdfWidth / img.width, pdfHeight / img.height);
                        
                        const scaleMultiplier = (page.scale || 100) / 100;
                        const finalWidth = img.width * ratio * scaleMultiplier;
                        const finalHeight = img.height * ratio * scaleMultiplier;
                        
                        const x = (pdfWidth - finalWidth) / 2;
                        const y = (pdfHeight - finalHeight) / 2;
                        
                        pdf.addImage(page.dataUrl, 'JPEG', x, y, finalWidth, finalHeight);
                        resolve();
                    };
                    img.src = page.dataUrl;
                });
            }

            pdf.save(`${targetDoc.title}.pdf`);
        }

        // --- EXPOSIÇÃO GLOBAL PARA BOTÕES DO DOM ---
        window.openScanner = openScanner;
        window.closeScanner = closeScanner;
        window.backToCamera = backToCamera;
        window.capturePage = capturePage;
        window.adjustPageScale = adjustPageScale;
        window.rotateCurrentPage = rotateCurrentPage;
        window.deleteCurrentPage = deleteCurrentPage;
        window.renameDocument = renameDocument;
        window.editDocument = editDocument;
        window.downloadPDF = downloadPDF;

        // Execução inicializada
        renderHomeDocs();
    </script>
</body>
</html>
