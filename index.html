<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DocScan Pro — Premium Scanner</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        :root {
            --bg-main: #090a0f;
            --surface: #161824;
            --accent: #3b82f6;
            --accent-gradient: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ----- ESTILOS ORIGINAIS MANTIDOS ----- */
        header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(22, 24, 36, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 10;
        }

        header h1 {
            font-size: 1.1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        header h1 i {
            color: var(--accent);
        }

        .badge-pages {
            background: rgba(59, 130, 246, 0.15);
            color: var(--accent);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .viewport-container {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            overflow: hidden;
        }

        video, canvas, .preview-image {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Ajustado para não cortar a imagem capturada */
            position: absolute;
        }
        
        video {
            object-fit: cover; /* Câmera continua cobrindo a tela */
        }

        .scanner-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .viewfinder-guide {
            width: 100%;
            height: 80%;
            max-width: 340px;
            max-height: 480px;
            border: 2px dashed rgba(255, 255, 255, 0.4);
            border-radius: 16px;
            position: relative;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.55);
        }

        .viewfinder-guide::before {
            content: '';
            position: absolute;
            width: 30px;
            height: 30px;
            border: 4px solid var(--accent);
            top: -4px; left: -4px;
            border-right: none; border-bottom: none;
            border-top-left-radius: 16px;
        }

        .viewfinder-guide .corner-br {
            position: absolute;
            bottom: -4px; right: -4px;
            width: 30px;
            height: 30px;
            border: 4px solid var(--accent);
            border-left: none; border-top: none;
            border-bottom-right-radius: 16px;
        }

        .viewfinder-guide .corner-tr {
            position: absolute;
            top: -4px; right: -4px;
            width: 30px;
            height: 30px;
            border: 4px solid var(--accent);
            border-left: none; border-bottom: none;
            border-top-right-radius: 16px;
        }

        .viewfinder-guide .corner-bl {
            position: absolute;
            bottom: -4px; left: -4px;
            width: 30px;
            height: 30px;
            border: 4px solid var(--accent);
            border-right: none; border-top: none;
            border-bottom-left-radius: 16px;
        }

        .helper-text {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.75);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .thumbnails-tray {
            height: 95px;
            background: #0d0f17;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 20px;
            overflow-x: auto;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .thumb-wrapper {
            position: relative;
            min-width: 55px;
            height: 75px;
            border-radius: 6px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
            flex-shrink: 0;
        }

        .thumb-wrapper.active-thumb {
            border-color: var(--accent);
            transform: scale(1.05);
        }

        .thumb-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .thumb-scale-badge {
            position: absolute;
            bottom: 2px;
            right: 2px;
            background: rgba(0,0,0,0.8);
            color: #fff;
            font-size: 9px;
            padding: 2px 4px;
            border-radius: 3px;
        }

        .control-panel {
            background: var(--surface);
            padding: 20px 30px 30px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 10;
        }

        .btn-secondary {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .btn-trigger-outer {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: 4px solid #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .btn-trigger-inner {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background: #fff;
            transition: transform 0.1s;
        }
        
        .btn-trigger-outer:active .btn-trigger-inner {
            transform: scale(0.9);
        }

        .btn-save-pdf {
            background: var(--accent-gradient);
            color: white;
            padding: 14px 24px;
            border-radius: 25px;
            font-weight: 600;
            font-size: 0.95rem;
            border: none;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        /* CONTINUAÇÃO DO CÓDIGO CORTADO NO FINAL E NOVOS ESTILOS */
        .btn-save-pdf:disabled, .btn-secondary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* ----- NOVOS ESTILOS: ESTRUTURA E FUNCIONALIDADES ADICIONAIS ----- */
        .hide { display: none !important; }
        .view-container { display: flex; flex-direction: column; height: 100vh; width: 100vw; }

        /* Estilos da Tela Inicial */
        .home-content { padding: 20px; overflow-y: auto; flex: 1; }
        
        .btn-scan-main {
            background: var(--accent-gradient);
            color: white;
            border: none;
            padding: 16px 24px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 600;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .docs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .doc-card {
            background: var(--surface);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .doc-preview {
            width: 100%;
            height: 120px;
            background: #000;
            border-radius: 8px;
            object-fit: cover;
        }

        .doc-title { font-size: 0.9rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .doc-date { font-size: 0.75rem; color: var(--text-secondary); }
        
        .doc-actions { display: flex; gap: 8px; margin-top: auto; }
        .btn-doc-action {
            flex: 1;
            padding: 8px 0;
            border-radius: 6px;
            border: none;
            font-size: 0.85rem;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-edit { background: rgba(255,255,255,0.1); color: white; }
        .btn-download { background: rgba(59, 130, 246, 0.2); color: var(--accent); }

        /* Botões de Edição (Girar e Deletar) sobre a imagem escaneada */
        .page-edit-controls {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 12px;
            z-index: 10;
        }

        .btn-action-circle {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(22, 24, 36, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }
        
        .btn-action-circle.danger { color: #ef4444; border-color: rgba(239, 68, 68, 0.3); }

        /* Botão para voltar à câmera quando vendo imagem */
        .add-more-card {
            min-width: 55px; height: 75px; border-radius: 6px;
            background: rgba(255,255,255,0.1); border: 2px dashed rgba(255,255,255,0.3);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; flex-shrink: 0; color: var(--text-secondary);
        }
    </style>
</head>
<body>

    <div id="home-view" class="view-container">
        <header>
            <h1><i class="fa-solid fa-file-signature"></i> DocScan Pro</h1>
        </header>
        <div class="home-content">
            <button class="btn-scan-main" onclick="openScanner()">
                <i class="fa-solid fa-camera"></i> Digitalizar Novo Documento
            </button>
            
            <h2 style="font-size: 1rem; margin-bottom: 15px; color: var(--text-secondary);">Seus Documentos</h2>
            
            <div id="docs-list" class="docs-grid">
                </div>
        </div>
    </div>

    <div id="scanner-view" class="view-container hide">
        <header>
            <div style="display:flex; align-items:center; gap:15px;">
                <button class="btn-secondary" style="width:36px; height:36px;" onclick="closeScanner()">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
                <h1><i class="fa-solid fa-file-signature"></i> Scanner</h1>
            </div>
            <div class="badge-pages"><span id="page-count">0</span> Páginas</div>
        </header>

        <div class="viewport-container">
            <video id="camera-feed" autoplay playsinline></video>
            
            <canvas id="capture-canvas" class="hide"></canvas>
            
            <img id="preview-image" class="preview-image hide" />

            <div id="scanner-overlay" class="scanner-overlay">
                <div class="viewfinder-guide">
                    <div class="corner-tr"></div>
                    <div class="corner-br"></div>
                    <div class="corner-bl"></div>
                </div>
                <div class="helper-text">Posicione o documento no quadro</div>
            </div>

            <div id="page-edit-controls" class="page-edit-controls hide">
                <button class="btn-action-circle" onclick="rotateCurrentPage()" title="Rotacionar 90º">
                    <i class="fa-solid fa-rotate-right"></i>
                </button>
                <button class="btn-action-circle danger" onclick="deleteCurrentPage()" title="Excluir Página">
                    <i class="fa-solid fa-trash"></i>
                </button>
            </div>
        </div>

        <div class="thumbnails-tray" id="thumbnails-tray">
            </div>

        <div class="control-panel">
            <button class="btn-secondary" id="btn-retake" onclick="backToCamera()" title="Voltar para câmera">
                <i class="fa-solid fa-camera"></i>
            </button>
            
            <div class="btn-trigger-outer" id="btn-capture" onclick="capturePage()">
                <div class="btn-trigger-inner"></div>
            </div>
            
            <button class="btn-save-pdf" id="btn-save" onclick="saveDocument()" disabled>
                <i class="fa-solid fa-check"></i> Concluir
            </button>
        </div>
    </div>

    <script>
        // --- ESTADO DA APLICAÇÃO ---
        let stream = null;
        let currentPages = []; // Array de Base64 das imagens da sessão atual
        let activePageIndex = -1; // -1 significa que a câmera está ativa
        let savedDocuments = []; // Array de documentos finalizados
        let editingDocId = null; // ID do documento caso esteja editando um existente

        // --- ELEMENTOS DO DOM ---
        const views = {
            home: document.getElementById('home-view'),
            scanner: document.getElementById('scanner-view')
        };
        const video = document.getElementById('camera-feed');
        const canvas = document.getElementById('capture-canvas');
        const previewImage = document.getElementById('preview-image');
        const scannerOverlay = document.getElementById('scanner-overlay');
        const pageEditControls = document.getElementById('page-edit-controls');
        const thumbnailsTray = document.getElementById('thumbnails-tray');
        const btnSave = document.getElementById('btn-save');
        const btnCapture = document.getElementById('btn-capture');
        const pageCountEl = document.getElementById('page-count');
        const docsListEl = document.getElementById('docs-list');

        // --- NAVEGAÇÃO E INICIALIZAÇÃO ---
        function openScanner(docToEdit = null) {
            views.home.classList.add('hide');
            views.scanner.classList.remove('hide');
            
            if (docToEdit) {
                editingDocId = docToEdit.id;
                currentPages = [...docToEdit.pages];
                updateThumbnails();
                if (currentPages.length > 0) {
                    viewPage(0); // Abre visualizando a primeira página
                } else {
                    startCamera();
                }
            } else {
                editingDocId = Date.now(); // Novo ID
                currentPages = [];
                updateThumbnails();
                startCamera();
            }
        }

        function closeScanner() {
            stopCamera();
            views.scanner.classList.add('hide');
            views.home.classList.remove('hide');
            renderHomeDocs();
        }

        // --- CÂMERA ---
        async function startCamera() {
            activePageIndex = -1;
            previewImage.classList.add('hide');
            pageEditControls.classList.add('hide');
            video.classList.remove('hide');
            scannerOverlay.classList.remove('hide');
            btnCapture.style.opacity = '1';
            btnCapture.style.pointerEvents = 'auto';

            updateThumbnailsUIActiveState();

            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } } 
                });
                video.srcObject = stream;
            } catch (err) {
                console.error("Erro ao acessar a câmera: ", err);
                alert("Não foi possível acessar a câmera. Verifique as permissões.");
            }
        }

        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
        }

        function backToCamera() {
            startCamera();
        }

        // --- CAPTURA ---
        function capturePage() {
            if (activePageIndex !== -1) return; // Só captura se a câmera estiver ativa

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const imgData = canvas.toDataURL('image/jpeg', 0.85); // Qualidade 85%
            currentPages.push(imgData);
            
            updateThumbnails();
            viewPage(currentPages.length - 1); // Mostra a página recém capturada
        }

        // --- VISUALIZAÇÃO E EDIÇÃO DE PÁGINA ---
        function viewPage(index) {
            stopCamera(); // Pausa a câmera enquanto visualiza
            activePageIndex = index;
            
            video.classList.add('hide');
            scannerOverlay.classList.add('hide');
            previewImage.src = currentPages[index];
            previewImage.classList.remove('hide');
            pageEditControls.classList.remove('hide');
            
            // Desabilita botão de captura ao ver página
            btnCapture.style.opacity = '0.3';
            btnCapture.style.pointerEvents = 'none';

            updateThumbnailsUIActiveState();
        }

        // --- ROTAÇÃO ---
        function rotateCurrentPage() {
            if (activePageIndex === -1) return;
            
            const imgData = currentPages[activePageIndex];
            const img = new Image();
            img.onload = function() {
                canvas.width = img.height;
                canvas.height = img.width;
                const ctx = canvas.getContext('2d');
                
                ctx.translate(canvas.width / 2, canvas.height / 2);
                ctx.rotate(Math.PI / 2); // 90 graus
                ctx.drawImage(img, -img.width / 2, -img.height / 2);
                
                const newImgData = canvas.toDataURL('image/jpeg', 0.85);
                currentPages[activePageIndex] = newImgData;
                previewImage.src = newImgData;
                updateThumbnails();
            };
            img.src = imgData;
        }

        // --- EXCLUSÃO INDIVIDUAL ---
        function deleteCurrentPage() {
            if (activePageIndex === -1) return;
            
            if(confirm("Tem certeza que deseja excluir esta página?")) {
                currentPages.splice(activePageIndex, 1);
                updateThumbnails();
                
                if (currentPages.length > 0) {
                    viewPage(currentPages.length - 1);
                } else {
                    startCamera();
                }
            }
        }

        // --- MINIATURAS ---
        function updateThumbnails() {
            thumbnailsTray.innerHTML = '';
            pageCountEl.innerText = currentPages.length;
            btnSave.disabled = currentPages.length === 0;

            currentPages.forEach((page, index) => {
                const wrapper = document.createElement('div');
                wrapper.className = `thumb-wrapper ${index === activePageIndex ? 'active-thumb' : ''}`;
                wrapper.onclick = () => viewPage(index);
                
                const img = document.createElement('img');
                img.src = page;
                
                const badge = document.createElement('div');
                badge.className = 'thumb-scale-badge';
                badge.innerText = index + 1;

                wrapper.appendChild(img);
                wrapper.appendChild(badge);
                thumbnailsTray.appendChild(wrapper);
            });

            // Botão para adicionar mais páginas (voltar à câmera)
            const addBtn = document.createElement('div');
            addBtn.className = 'add-more-card';
            addBtn.innerHTML = '<i class="fa-solid fa-plus"></i>';
            addBtn.onclick = () => startCamera();
            thumbnailsTray.appendChild(addBtn);

            // Rola para o final
            thumbnailsTray.scrollLeft = thumbnailsTray.scrollWidth;
        }

        function updateThumbnailsUIActiveState() {
            const thumbs = thumbnailsTray.querySelectorAll('.thumb-wrapper');
            thumbs.forEach((t, i) => {
                if(i === activePageIndex) t.classList.add('active-thumb');
                else t.classList.remove('active-thumb');
            });
        }

        // --- SALVAR E GERAR PDF ---
        function saveDocument() {
            if (currentPages.length === 0) return;

            // Atualiza ou adiciona no array de documentos
            const existingIndex = savedDocuments.findIndex(d => d.id === editingDocId);
            const docObj = {
                id: editingDocId,
                title: `Documento ${new Date().toLocaleDateString()}`,
                date: new Date().toLocaleString(),
                pages: [...currentPages]
            };

            if (existingIndex > -1) {
                savedDocuments[existingIndex] = docObj;
            } else {
                savedDocuments.push(docObj);
            }

            closeScanner();
        }

        async function downloadPDF(docId) {
            const doc = savedDocuments.find(d => d.id === docId);
            if (!doc || doc.pages.length === 0) return;

            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4'); // Retrato, milímetros, formato A4
            const pdfWidth = pdf.internal.pageSize.getWidth();
            const pdfHeight = pdf.internal.pageSize.getHeight();

            for (let i = 0; i < doc.pages.length; i++) {
                if (i > 0) pdf.addPage();
                
                const imgData = doc.pages[i];
                
                // Precisamos saber as dimensões da imagem para ajustá-la no PDF sem distorcer
                await new Promise((resolve) => {
                    const img = new Image();
                    img.onload = () => {
                        const ratio = Math.min(pdfWidth / img.width, pdfHeight / img.height);
                        const finalWidth = img.width * ratio;
                        const finalHeight = img.height * ratio;
                        
                        // Centralizar na página A4
                        const x = (pdfWidth - finalWidth) / 2;
                        const y = (pdfHeight - finalHeight) / 2;
                        
                        pdf.addImage(imgData, 'JPEG', x, y, finalWidth, finalHeight);
                        resolve();
                    };
                    img.src = imgData;
                });
            }

            pdf.save(`${doc.title}.pdf`);
        }

        // --- RENDERIZAR TELA INICIAL ---
        function renderHomeDocs() {
            docsListEl.innerHTML = '';
            
            if (savedDocuments.length === 0) {
                docsListEl.innerHTML = '<p style="color:var(--text-secondary); grid-column:1/-1; text-align:center; padding: 20px;">Nenhum documento digitalizado ainda.</p>';
                return;
            }

            savedDocuments.forEach(doc => {
                const card = document.createElement('div');
                card.className = 'doc-card';
                
                card.innerHTML = `
                    <img src="${doc.pages[0]}" class="doc-preview" />
                    <div class="doc-title">${doc.title}</div>
                    <div class="doc-date">${doc.pages.length} página(s) • ${doc.date}</div>
                    <div class="doc-actions">
                        <button class="btn-doc-action btn-edit" onclick="editDocument(${doc.id})"><i class="fa-solid fa-pen"></i> Editar</button>
                        <button class="btn-doc-action btn-download" onclick="downloadPDF(${doc.id})"><i class="fa-solid fa-download"></i> Baixar</button>
                    </div>
                `;
                docsListEl.appendChild(card);
            });
        }

        function editDocument(id) {
            const doc = savedDocuments.find(d => d.id === id);
            if (doc) openScanner(doc);
        }

        // Inicializa a tela (vazia por padrão)
        renderHomeDocs();
    </script>
</body>
</html>
